<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Software Dashboard | Premium Cloud Solutions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --accent: #8b5cf6;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-blur: blur(12px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            padding-bottom: 100px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* --- Header Section --- */
        header {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInDown 0.8s ease-out;
        }

        header h1 {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #818cf8, #f472b6, #fb7185);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto;
        }

        /* --- Tabs Navigation --- */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
        }

        .tab-btn {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            padding: 12px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: var(--glass-blur);
        }

        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .tab-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }

        /* --- Search Bar --- */
        .search-container {
            max-width: 500px;
            margin: 0 auto 40px;
            position: relative;
        }

        #searchInput {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            padding: 15px 25px;
            border-radius: 15px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
            backdrop-filter: var(--glass-blur);
        }

        #searchInput:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        /* --- Filter Chips --- */
        .filters {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filter-chip {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            color: var(--text-muted);
            padding: 8px 18px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .filter-chip:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .filter-chip.active {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border-color: var(--primary);
        }

        /* --- Download Link --- */
        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            margin-top: 20px;
            transition: 0.3s;
            padding: 8px 16px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
        }

        .download-btn:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.1);
        }

        /* --- Card Actions --- */
        .card-actions {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .get-btn {
            background: var(--primary);
            color: white;
            padding: 8px 24px;
            border-radius: 99px;
            font-weight: 700;
            font-size: 0.9rem;
            text-decoration: none;
            transition: 0.3s;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
        }

        .get-btn:hover {
            background: var(--primary-dark);
            transform: scale(1.05);
            box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4);
        }

        /* --- Memos --- */
        .memo-card {
            background: rgba(255, 255, 255, 0.03);
            border-left: 4px solid var(--primary);
            padding: 25px;
            border-radius: 0 20px 20px 0;
            margin-bottom: 20px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .memo-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-left-color: var(--secondary);
            transform: translateX(10px);
        }

        .memo-card h3 {
            margin-bottom: 10px;
            font-size: 1.3rem;
        }

        .memo-card p {
            color: var(--text-muted);
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .grid.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 30px;
            text-decoration: none;
            color: inherit;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: var(--glass-blur);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .card-compact {
            padding: 20px;
            border-radius: 18px;
        }

        .card-compact h2 {
            font-size: 1.2rem;
        }

        .card-compact p {
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            opacity: 0;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-8px) scale(1.02);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card h2 {
            font-size: 1.5rem;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card p {
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 20px;
            flex-grow: 1;
        }

        .card-footer {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .badge {
            background: rgba(255, 255, 255, 0.1);
            padding: 6px 14px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #e2e8f0;
        }

        .badge.status-demo {
            color: #4ade80;
            background: rgba(74, 222, 128, 0.1);
        }

        .badge.status-private {
            color: #f472b6;
            background: rgba(244, 114, 182, 0.1);
        }

        /* --- Password Modal --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: none;
            /* Changed via JS */
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: #1e293b;
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--card-border);
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .modal h2 {
            margin-bottom: 20px;
        }

        .modal input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--card-border);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.2rem;
            letter-spacing: 4px;
        }

        .modal button {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .modal button:hover {
            background: var(--primary-dark);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Mobile Adjustments */
        @media (max-width: 640px) {
            header h1 {
                font-size: 2.5rem;
            }

            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="container" id="mainContainer">
        <header>
            <h1>Software Hub</h1>
            <p>Unified dashboard for all my custom-built applications and experimental tools.</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" id="demoTabBtn" onclick="switchTab('demo')">Public Demos</button>
            <button class="tab-btn" id="downloadsTabBtn" onclick="switchTab('downloads')">Downloads</button>
            <button class="tab-btn" id="memosTabBtn" onclick="switchTab('memos')">Memos</button>
            <button class="tab-btn" id="privateTabBtn" onclick="switchTab('private')">Private Tools</button>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Find an application..." oninput="handleSearch()">
        </div>

        <div class="filters" id="filterContainer">
            <button class="filter-chip active" onclick="setFilter('all', this)">All</button>
            <button class="filter-chip" onclick="setFilter('Web App', this)">Web Apps</button>
            <button class="filter-chip" onclick="setFilter('Web Page', this)">Web Pages</button>
        </div>

        <div class="grid visible" id="appGrid">
            <!-- Apps will be rendered here -->
        </div>
    </div>

    <!-- Password Modal -->
    <div class="modal-overlay" id="passwordModal">
        <div class="modal">
            <h2>Restricted Area</h2>
            <p style="margin-bottom: 20px; color: var(--text-muted);">Please enter the access key to view private
                applications.</p>
            <input type="password" id="passwordInput" placeholder="••••"
                onkeydown="if(event.key==='Enter') verifyPassword()">
            <button onclick="verifyPassword()">Unlock Access</button>
            <p id="passwordError" style="color: var(--secondary); margin-top: 15px; display: none;">Incorrect password.
                Try again.</p>
            <button onclick="closeModal('passwordModal')"
                style="background: transparent; color: var(--text-muted); margin-top: 10px; font-weight: 400;">Cancel</button>
        </div>
    </div>

    <!-- Memo Modal -->
    <div class="modal-overlay" id="memoModal">
        <div class="modal" style="max-width: 600px; text-align: left;">
            <h2 id="modalMemoTitle"
                style="margin-bottom: 15px; background: linear-gradient(to right, #818cf8, #f472b6); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">
                Memo Title</h2>
            <div id="modalMemoContent"
                style="color: var(--text-main); line-height: 1.8; font-size: 1.1rem; margin-bottom: 30px; white-space: pre-wrap;">
                Memo content goes here...</div>
            <button onclick="closeModal('memoModal')">Close Window</button>
        </div>
    </div>

    <script>
        let currentTab = 'demo';
        let currentType = 'all';
        let demoApps = [];
        let downloadsApps = [];
        let memos = [];
        let privateApps = [];
        let isPrivateUnlocked = false;

        const PASSWORD_KEY = "R9211"; // Provided by user

        // Initial Load
        window.onload = () => {
            loadApps('apps.json', (data) => {
                demoApps = data;
                renderApps(demoApps);
            });
            loadApps('downloads.json', (data) => {
                downloadsApps = data;
            });
            loadApps('memos.json', (data) => {
                memos = data;
            });
        };

        function loadApps(file, callback) {
            const cacheBuster = `?t=${new Date().getTime()}`;
            fetch(file + cacheBuster, { cache: 'no-cache' })
                .then(res => {
                    if (!res.ok) throw new Error("File not found");
                    return res.json();
                })
                .then(data => callback(data))
                .catch(err => {
                    console.error("Error loading apps:", err);
                    if (window.location.protocol === 'file:') {
                        showLocalFileWarning();
                    } else {
                        const grid = document.getElementById('appGrid');
                        grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--secondary);">
                            <p style="font-weight: 600; margin-bottom: 10px;">Unable to load ${file}</p>
                            <p style="font-size: 0.9rem; color: var(--text-muted);">Please check if the file exists and is valid JSON.</p>
                        </div>`;
                    }
                });
        }

        function showLocalFileWarning() {
            const grid = document.getElementById('appGrid');
            grid.innerHTML = `
                <div style="grid-column: 1/-1; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); padding: 30px; border-radius: 20px; text-align: center;">
                    <h3 style="color: #ef4444; margin-bottom: 15px;">Local File Restriction Detected</h3>
                    <p style="color: var(--text-muted); line-height: 1.6; margin-bottom: 20px;">
                        Browsers block data loading (CORS) when opening files directly from your computer. 
                        <strong>This dashboard will work perfectly once uploaded to GitHub!</strong>
                    </p>
                    <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
                        <span class="badge" style="background: rgba(255,255,255,0.05);">Solution 1: Upload to GitHub</span>
                        <span class="badge" style="background: rgba(255,255,255,0.05);">Solution 2: Use VS Code Live Server</span>
                    </div>
                </div>
            `;
        }

        function switchTab(tab) {
            if (tab === currentTab) return;

            if (tab === 'private' && !isPrivateUnlocked) {
                document.getElementById('passwordModal').style.display = 'flex';
                document.getElementById('passwordInput').focus();
                return;
            }

            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`${tab}TabBtn`).classList.add('active');

            // Hide/Show Filters
            const filterContainer = document.getElementById('filterContainer');
            if (filterContainer) {
                filterContainer.style.display = (tab === 'demo' || tab === 'private') ? 'flex' : 'none';
            }

            currentTab = tab;
            const grid = document.getElementById('appGrid');
            grid.classList.remove('visible');

            setTimeout(() => {
                loadApps(tab === 'memos' ? 'memos.json' : (tab === 'downloads' ? 'downloads.json' : (tab === 'private' ? 'private.json' : 'apps.json')), (data) => {
                    if (tab === 'demo') demoApps = data;
                    else if (tab === 'downloads') downloadsApps = data;
                    else if (tab === 'memos') memos = data;
                    else if (tab === 'private') privateApps = data;

                    renderApps(data);
                    grid.classList.add('visible');
                });
            }, 300);
        }

        function verifyPassword() {
            const input = document.getElementById('passwordInput').value;
            const error = document.getElementById('passwordError');

            if (input === PASSWORD_KEY) {
                isPrivateUnlocked = true;
                closeModal('passwordModal');
                loadApps('private.json', (data) => {
                    privateApps = data;
                    switchTab('private');
                });
            } else {
                error.style.display = 'block';
                document.getElementById('passwordInput').value = '';
            }
        }

        function openMemoModal(index) {
            const memo = memos[index];
            if (!memo) return;
            document.getElementById('modalMemoTitle').innerText = memo.title;
            document.getElementById('modalMemoContent').innerText = memo.content;
            document.getElementById('memoModal').style.display = 'flex';
        }

        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
            if (id === 'passwordModal') {
                document.getElementById('passwordInput').value = '';
                document.getElementById('passwordError').style.display = 'none';
            }
        }

        function setFilter(type, el) {
            currentType = type;
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            handleSearch();
        }

        function renderApps(apps) {
            const grid = document.getElementById('appGrid');
            const search = document.getElementById('searchInput').value.toLowerCase();

            const filtered = apps.filter(app => {
                const title = app.name || app.title || "";
                const desc = app.desc || app.content || "";
                const matchesSearch = title.toLowerCase().includes(search) ||
                    desc.toLowerCase().includes(search);
                const matchesType = (currentType === 'all' || currentTab === 'memos' || app.type === currentType);
                return matchesSearch && matchesType;
            });

            if (currentTab === 'memos') {
                grid.innerHTML = filtered.length ? filtered.map((memo, idx) => `
                    <div class="memo-card" onclick="openMemoModal(${idx})">
                        <h3>${memo.title}</h3>
                        <p>${memo.content}</p>
                    </div>
                `).join('') : `<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text-muted);">No memos found matching your criteria.</div>`;
                return;
            }

            grid.innerHTML = filtered.length ? filtered.map(app => `
                <div class="card ${currentTab === 'downloads' ? 'card-compact' : ''}">
                    <h2>${app.name}</h2>
                    <p>${app.desc}</p>
                    <div class="card-footer">
                        <span class="badge ${currentTab === 'private' ? 'status-private' : 'status-demo'}">${app.status}</span>
                        ${app.type ? `<span class="badge" style="background: rgba(99, 102, 241, 0.1); color: #818cf8;">${app.type}</span>` : ''}
                        ${app.deploy ? `<span class="badge">${app.deploy}</span>` : ''}
                    </div>
                    <div class="card-actions" style="${currentTab === 'downloads' ? 'justify-content: flex-end;' : ''}">
                        ${currentTab !== 'downloads' ? `<a href="${app.url}" target="_blank" style="color: var(--primary); font-weight: 600; text-decoration: none; font-size: 0.9rem;">Open App ↗</a>` : ''}
                        ${app.downloadUrl ? `
                            <button onclick="handleDownload('${app.downloadUrl}', '${app.name}')" class="get-btn" style="border:none; cursor:pointer;">GET</button>
                        ` : ''}
                    </div>
                </div>
            `).join('') : `<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text-muted);">No applications found matching your criteria.</div>`;
        }

        function handleDownload(url, name) {
            if (url.startsWith('http')) {
                window.open(url, '_blank');
            } else {
                const link = document.createElement('a');
                link.href = url;
                link.download = name;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        }

        function handleSearch() {
            let targetData = demoApps;
            if (currentTab === 'downloads') targetData = downloadsApps;
            else if (currentTab === 'memos') targetData = memos;
            else if (currentTab === 'private') targetData = privateApps;
            renderApps(targetData);
        }
    </script>
</body>

</html>
